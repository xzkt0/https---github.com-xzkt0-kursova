workflows:
  ios-dev-build:
    name: iOS Development Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd fmi_schedule
          flutter pub get
      - name: Pod install
        script: |
          cd fmi_schedule/ios
          pod install
      - name: Build iOS (no codesign)
        script: |
          cd fmi_schedule
          flutter build ios --release --no-codesign
    artifacts:
      - fmi_schedule/build/ios/iphoneos/Runner.app
